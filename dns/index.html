<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ProxyGo · 蜗奶奶（中国）</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="container">
    <div class="header-row">
        <div class="title-box">
            <h1>ProxyGo</h1>
        </div>
        <!-- 右上角设置按钮：纯图标设计 -->
        <div class="settings-icon-btn" id="settingsIconBtn" title="节点管理">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.07.07A10 10 0 0 0 12 17.66a10 10 0 0 0 6.18-2.24l.07-.07Z" />
                <path d="M14.05 6.27A8.5 8.5 0 0 0 12 5.8a8.5 8.5 0 0 0-6.18 2.24l-.07.07A1.65 1.65 0 0 0 5.2 9.9" />
            </svg>
        </div>
    </div>
    <div class="sub">全球智能路由 · 无门槛加速任意站点，即输即用</div>

    <label>目标网址</label>
    <input type="text" id="targetUrl" placeholder="直接输入网址，例如 https://openai.com 或 openai.com" autofocus>

    <button class="btn-dns" id="dnsAccessBtn">访问网站</button>
</div>

<script src="index.js"></script>
</body>
</html>
