<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>网络加速服务 · 全球安全边缘网络</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text: #0f172a;
            --sub: #475569;
            --accent: #f38020;
            --accent-glow: #f59e0b;
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.08), 0 10px 15px -6px rgba(0, 0, 0, 0.02);
            --radius: 32px;
            --blur: blur(18px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #eef2ff 0%, #e0e7ff 45%, #c7d2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 70%;
            background: radial-gradient(circle at 30% 30%, rgba(243, 128, 32, 0.13) 0%, transparent 60%);
            z-index: 0;
            filter: blur(60px);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: var(--radius);
            box-shadow: var(--shadow), 0 0 0 1px var(--border);
            padding: 2.5rem 2.2rem;
            text-align: center;
            transition: all 0.25s ease;
            animation: floatIn 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 0.45rem 1.2rem;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #15803d;
            margin-bottom: 1.8rem;
            letter-spacing: 0.3px;
        }

        .live-dot {
            width: 9px;
            height: 9px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse-dot 1.8s infinite;
        }

        @keyframes pulse-dot {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(34, 197, 94, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .icon-wrapper {
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            width: 88px;
            height: 88px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.8rem;
            box-shadow: 0 12px 18px -10px rgba(243, 128, 32, 0.25), 0 0 0 1px rgba(243, 128, 32, 0.1);
            transition: transform 0.2s ease;
        }

        .icon-wrapper:hover {
            transform: scale(1.02);
        }

        .icon-emoji {
            font-size: 2.8rem;
            line-height: 1;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--sub);
            font-weight: 450;
            margin-bottom: 2.2rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0 2.2rem;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.5rem 0.7rem;
            border: 1px solid rgba(203, 213, 225, 0.4);
            transition: all 0.25s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .feature-item:hover {
            transform: translateY(-3px);
            border-color: rgba(243, 128, 32, 0.3);
            box-shadow: 0 16px 24px -10px rgba(243, 128, 32, 0.18);
            background: rgba(255, 255, 255, 0.9);
        }

        .feature-emoji {
            font-size: 2rem;
            margin-bottom: 0.65rem;
            display: block;
        }

        .feature-title {
            font-weight: 650;
            font-size: 0.95rem;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }

        .feature-desc {
            font-size: 0.78rem;
            color: #64748b;
            line-height: 1.4;
        }

        .meta-info {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #64748b;
            background: rgba(241, 245, 249, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 100px;
            padding: 0.7rem 1.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .cf-orange {
            color: #f38020;
            font-weight: 600;
        }

        hr {
            margin: 2rem 0 1.2rem;
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #cbd5e1, transparent);
        }

        .small-note {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.8rem;
        }

        /* 管理入口样式 */
        .admin-entry {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .admin-link {
            color: #64748b;
            text-decoration: none;
            background: rgba(241, 245, 249, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 0.4rem 1.4rem;
            border-radius: 100px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #f38020;
            color: #f38020;
            box-shadow: 0 4px 12px rgba(243, 128, 32, 0.15);
            transform: translateY(-1px);
        }

        .admin-icon {
            font-size: 1rem;
            opacity: 0.8;
        }

        @media (max-width: 500px) {
            .glass-card {
                padding: 2rem 1.3rem;
            }
            h1 {
                font-size: 1.9rem;
            }
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="status-badge">
                <span class="live-dot"></span> 服务运行中 · 全球边缘就绪
            </div>

            <div class="icon-wrapper">
                <span class="icon-emoji">☁️🔒</span>
            </div>

            <h1>全球安全网络加速</h1>
            <p class="subtitle">
                基于 Cloudflare 全球边缘网络，为您提供低延迟、高稳定的加密通道。<br>
                隐私保护 · 高速访问 · 零配置体验。
            </p>

            <div class="feature-grid">
                <div class="feature-item">
                    <span class="feature-emoji">⚡</span>
                    <div class="feature-title">极速连接</div>
                    <div class="feature-desc">智能路由优化</div>
                </div>
                <div class="feature-item">
                    <span class="feature-emoji">🌍</span>
                    <div class="feature-title">全球节点</div>
                    <div class="feature-desc">300+ 城市边缘</div>
                </div>
                <div class="feature-item">
                    <span class="feature-emoji">🔐</span>
                    <div class="feature-title">端到端加密</div>
                    <div class="feature-desc">数据全程保护</div>
                </div>
                <div class="feature-item">
                    <span class="feature-emoji">🛡️</span>
                    <div class="feature-title">隐私优先</div>
                    <div class="feature-desc">无日志 · 匿名</div>
                </div>
            </div>

            <hr>

            <div class="meta-info">
                <span>⚙️ 驱动引擎</span>
                <span class="cf-orange">Cloudflare Workers</span>
                <span>· 边缘计算</span>
            </div>
            <div class="small-note">
                您的网络请求正通过安全边缘网络进行优化与转发
            </div>

            <!-- 后台管理入口 -->
            <div class="admin-entry">
                <a href="/admin" class="admin-link" title="管理控制台">
                    <span class="admin-icon">🔧</span> 管理控制台
                </a>
            </div>
        </div>
    </div>
</body>
</html>
