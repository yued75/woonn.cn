<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action=manipulation">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <meta name="description" content="可定博客的 404 错误页面，虽然你访问的页面找不回来了，但是我们可以一起寻找失踪宝贝！" />
  <meta name="keywords" content="404,404 错误页面,可定博客,一起寻找失踪宝贝,404 公益计划" />
  <title>蜗奶奶（中国）404 - 页面未找到 | 公益互动</title>
  <link rel="stylesheet" href="css/404.css">
</head>
<body>
  <!-- 全屏背景层（背景图模式） -->
  <div id="bg"></div>

  <!-- 主容器 -->
  <main id="bbhj">
    <!-- 宝贝回家信息卡片（模式1） -->
    <section class="mod_404" style="display:none;">
      <div class="child_box">
        <span class="frt"><img src="../favicon.ico" width="32px" onerror="this.style='display:none'"></span>
        <div class="child_avatar" id="photo"></div>
        <div class="child_info">
          <div class="info_item"><span class="info_lbl">姓名性别：</span><span class="item_inner" id="namesex">…</span></div>
          <div class="info_item"><span class="info_lbl">走失大概：</span><span class="item_inner" id="ageheight">…</span></div>
          <div class="info_item"><span class="info_lbl">出生日期：</span><span class="item_inner" id="born_date">…</span></div>
          <div class="info_item"><span class="info_lbl">走失时间：</span><span class="item_inner" id="missingtime">…</span></div>
          <div class="info_item"><span class="info_lbl">线索电话：</span><span class="item_inner" id="contact">…</span></div>
          <div class="info_item"><span class="info_lbl">走失地点：</span><span class="item_inner" id="missingaddress"></span></div>
          <div class="info_item"><span class="info_lbl">典型特征：</span><span class="item_inner" id="feature">…</span></div>
          <span class="closeDetail">收起</span>
        </div>
      </div>
    </section>

    <!-- 拼图展示区 -->
    <section class="collage-404" style="display:none;">
      <h1>404</h1>
      <div class="collage-404-images"></div>
    </section>

    <!-- 腾讯失踪儿童搜索容器（模式3） -->
    <section class="lostchild-section" id="lostchildSection" style="display:none;"></section>

    <!-- 统一的404说明 -->
    <section class="message-404">
      <div class="code-404">404</div>
      <div class="subtitle-404" id="dynamicMessage">页面未找到，但善意永在</div>
    </section>

    <!-- 游戏区域（模式2） -->
    <section class="game-section" id="gameSection">
      <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-card" id="introCard">
            <h3 id="introTitle"></h3>
            <p class="desc" id="introDesc"></p>
            <p class="goal" id="introGoal"></p>
            <button class="btn-primary" id="startBtn">开始挑战</button>
          </div>
          <div class="overlay-card hidden" id="endCard">
            <h3>感谢参与</h3>
            <p class="desc" id="endComment"></p>
            <button class="btn-primary" id="replayBtn">再来一次</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 底部操作栏 -->
    <div class="action-bar">
      <button class="btn-outline" id="refreshBtn">🔄 刷新页面</button>
      <a href="/" class="btn-outline">🏠 网站首页</a>
      <a href="javascript:history.go(-1);" class="btn-outline">↩ 后退</a>
      <button class="btn-donate" id="donateBtn">💛 公益捐赠</button>
    </div>
  </main>

  <!-- 捐赠弹窗 -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h2>支持公益项目</h2>
      <div id="projectListContainer"></div>
      <button class="btn-outline close-modal" id="closeModalBtn">关闭</button>
    </div>
  </div>

  <script src="js/404.js"></script>
</body>
</html>
