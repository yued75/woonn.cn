<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>蜗奶奶科技-404公益</title>
    <style>
        #bg {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-size: cover;
        }
    </style>
</head>
<body>
    <!-- 网页内容 -->
    <a href='/' target='_self'><div id="bg"></div></a>
    <script>
        function changeBackground() {
            var info = navigator.userAgent;
            //通过正则表达式的test方法判断是否包含“Mobile”字符串
            var isPhone = /mobile/i.test(info);
            //如果包含“Mobile”（是手机设备）则返回true
            if (isPhone) {
                // 背景图像URL数组
                var backgrounds = [
                    'url("img/绿色找回1m.png")',
                    'url("img/绿色找回2m.jpg")',
                    'url("img/台风m.jpg")',
                    'url("img/残障人士m.png")'
                ];
            } else {
                // 背景图像URL数组
                var backgrounds = [
                    'url("img/绿色找回1.png")',
                    'url("img/绿色找回2.jpg")',
                    'url("img/台风.jpg")',
                    'url("img/障碍人士.png")'
                ];
            }            
            // 随机选择要展示的内容
            var randomIndex = Math.floor(Math.random() * 4);
            var bgElement = document.getElementById('bg'); 
                bgElement.style.display = 'block';
                // 从背景图像数组中随机选择一个URL
                var randomBackground = backgrounds[randomIndex];
                // 将选定的URL应用于指定的元素
                bgElement.style.backgroundImage = randomBackground;
        }
        // 初始化页面加载时更换背景
        changeBackground();
    </script>
</body>
</html>
