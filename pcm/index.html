<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燃气管道防腐层PCM检测数据生成系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- ==================== 授权登录界面 ==================== -->
<div id="loginPage">
    <div class="login-card">
        <div class="login-card-topbar"></div>
        <div class="login-title">
            <h2>燃气管道防腐层PCM检测数据生成系统</h2>
        </div>
        <div class="login-input-wrapper">
            <input type="text" id="loginUsername" placeholder="请输入身份识别凭证完成验证，方可使用本系统功能">
        </div>
        <div id="loginTip"></div>
        <button id="loginBtn">验证并进入系统</button>
        <div class="login-footer">
            本系统由蜗奶奶（中国）提供 | 如有任何问题请联系管理员
        </div>
    </div>
</div>

<!-- ==================== 系统主内容 ==================== -->
<div id="systemMain">
    <div class="page-title">燃气管道防腐层PCM检测数据生成系统</div>
    <div class="container">
        <!-- 左侧输入区域 -->
        <div class="input-area">
            <!-- 用户信息、后台管理、登出区域 -->
            <div id="userInfoBar" class="user-info-bar">
                <span id="displayUsername"></span>
                <span id="displayExpire"></span>
                <a id="adminLink" href="admin.html" target="_blank" class="info-link" style="display:none;">后台管理</a>
                <a id="logoutLink" href="javascript:void(0)" class="info-link">登出</a>
            </div>

            <!-- 参数输入区 -->
            <div class="input-group zcbj">
                <h3>基础参数</h3>
                <div class="input-item"><label>管段长度(m)：</label><input type="number" id="totalDistance" placeholder="例：1627" required></div>
                <div class="input-item"><label>输出电流(mA)：</label><input type="number" id="outputCurrent" placeholder="例：600" required></div>
                <div class="input-item"><label>管段起点：</label><input type="text" id="pipeStart" placeholder="例：2栋调压箱"></div>
                <div class="input-item"><label>管段终点：</label><input type="text" id="pipeEnd" placeholder="例：市政阀井"></div>
                <div class="input-item"><label>地形地貌：</label><input type="text" id="defaultTerrain" placeholder="例：人行道/绿化带（默认）"></div>
            </div>
            <div class="input-group zcbj">
                <h3>数据1范围</h3>
                <div class="input-item"><label>最大值(mA)：</label><input type="number" id="data1Max" placeholder="默认为输出电流的80-90%"></div>
                <div class="input-item"><label>最小值(mA)：</label><input type="number" id="data1Min" placeholder="末端默认为15-30"></div>                
            </div>
            <div class="input-group zcbj">
                <h3>埋深范围</h3>
                <div class="input-item"><label>最深值(m)：</label><input type="number" step="0.01" id="burialMax" placeholder="例：0.82"></div>
                <div class="input-item"><label>最浅值(m)：</label><input type="number" step="0.01" id="burialMin" placeholder="例：0.68"></div>
            </div>
            <div class="input-group">
                <h3>特殊点标记</h3>
                <div class="special-point-group"><textarea class="textareayangshi" id="specialPoints" placeholder="例：11:左弯,42:三通,108:阀井
如需多个请用逗号或空格隔开"></textarea></div>
            </div>
            <div class="operate-area">
                <button class="operate-btn" id="generateBtn"><i class="fas fa-magic"></i> 生成</button>
                <button class="operate-btn" id="copyToExcelBtn"><i class="fas fa-copy"></i> 复制</button>
                <button class="operate-btn" id="exportExcelBtn"><i class="fas fa-download"></i> 导出</button>
            </div>
        </div>

        <!-- 右侧预览区域 -->
        <div class="preview-area">
            <div class="preview-header">
                <div class="preview-title">检测数据预览</div>
                <div class="status-badge"><span class="dot"></span> 运行中</div>
            </div>
            <div class="preview-tip">使用说明：序号不可编辑，其余均可编辑。更改电流列数据会导致后续电流同步更改。右键可插入/删除行。</div>
            <div class="table-wrapper">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>序号</th><th>距离(m)</th><th>数据1(mA)</th><th>地形地貌</th><th>埋深(m)</th>
                            <th>破损点编号</th><th>db值</th><th>破损分级</th><th>坐标</th><th>位置描述</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 提示框与右键菜单 -->
<div class="tip-box" id="tipBox"></div>
<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" id="insertBefore">上方插入</div>
    <div class="context-menu-item" id="insertAfter">下方插入</div>
    <div class="context-menu-item" id="deleteRow">删除本行</div>
</div>

<!-- 引入 Supabase SDK，用于日志记录 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/index.js"></script>
</body>
</html>
