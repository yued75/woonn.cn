<!DOCTYPE html>
<html>
<head>
    <title>网络对时</title>
</head>
<body>
    <div id="server-time">加载中...</div>
    <script>
        // 用于存储 服务器时间 与 本地时间 的差值（毫秒）
        let timeOffset = 0; 

        // 从 GitHub Pages 的 HTTP 响应头中获取服务器当前的时间
        async function syncServerTime() {
            try {
                const response = await fetch(location.href + '?t=' + Date.now(), {
                    method: 'HEAD', // 只需要响应头，不传回Body，更轻量
                    cache: 'no-store' // 关键，确保每次都是新请求，不被缓存
                });
                const serverDateHeader = response.headers.get('Date');
                if (!serverDateHeader) throw new Error('无法获取响应头Date');
                const serverTime = new Date(serverDateHeader).getTime();
                const clientTime = Date.now();
                timeOffset = serverTime - clientTime;
                updateDisplay();
                setInterval(updateDisplay, 1000);
            } catch (error) {
                console.error(error);
                document.getElementById('server-time').innerText = '时间同步失败，请刷新页面重试';
            }
        }

        // 根据差值计算并显示当前的服务器时间
        function updateDisplay() {
            const now = new Date(Date.now() + timeOffset);
            // 重新格式化为 YYYY-MM-DD HH:MM:SS
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            // 更新到页面上
            document.getElementById('server-time').innerText = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 启动
        syncServerTime();
    </script>
</body>
</html>
